<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Role to Classet API Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f8f9fb;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);
    padding: 40px 36px;
    width: 100%;
    max-width: 460px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }

  label .hint {
    font-weight: 400;
    color: #9ca3af;
  }

  input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #1a1a2e;
    transition: border-color .15s;
    outline: none;
  }

  input:focus {
    border-color: #7c3aed;
    box-shadow: 0 0 0 3px rgba(124, 58, 237, .1);
  }

  input::placeholder {
    color: #c4c8d0;
  }

  .btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s;
  }

  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .status {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.4;
    display: none;
  }

  .status.success {
    display: block;
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
  }

  .status.error {
    display: block;
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }

  .status.loading {
    display: block;
    background: #eff6ff;
    color: #1e40af;
    border: 1px solid #bfdbfe;
  }

  .history {
    margin-top: 28px;
    border-top: 1px solid #f3f4f6;
    padding-top: 20px;
  }

  .history h2 {
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 12px;
  }

  .history-item {
    background: #f9fafb;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #374151;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-item .ids {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #7c3aed;
  }

  .empty-history {
    font-size: 13px;
    color: #9ca3af;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Add Role to Classet API Flow</h1>
  <p class="subtitle">Add a new HireArt-to-Classet role mapping. This sends the data directly to Make.com.</p>

  <form id="roleForm">
    <div class="field">
      <label>Candidate List ID <span class="hint">(HireArt)</span></label>
      <input type="number" id="candidateListId" placeholder="e.g. 8412" required>
    </div>

    <div class="field">
      <label>Classet Job ID</label>
      <input type="number" id="classetJobId" placeholder="e.g. 29469" required>
    </div>

    <div class="field">
      <label>Role Name <span class="hint">(for reference)</span></label>
      <input type="text" id="roleName" placeholder="e.g. Sr. Data Analyst — Acme">
    </div>

    <button type="submit" class="btn" id="submitBtn">Add Role Mapping</button>
  </form>

  <div class="status" id="status"></div>

  <div class="history" id="historySection">
    <h2>Added this session</h2>
    <div id="historyList">
      <p class="empty-history">No mappings added yet.</p>
    </div>
  </div>
</div>

<script>
  // =============================================
  // UPDATE THIS URL with your Make.com webhook
  // =============================================
  const WEBHOOK_URL = 'https://hook.us1.make.celonis.com/fvj3fgsha67vic3cxfpcckavkv81oocp';

  const form = document.getElementById('roleForm');
  const status = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');
  const historyList = document.getElementById('historyList');
  let submissions = [];

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const candidateListId = document.getElementById('candidateListId').value;
    const classetJobId = document.getElementById('classetJobId').value;
    const roleName = document.getElementById('roleName').value;

    // Show loading state
    status.className = 'status loading';
    status.textContent = 'Sending to Make.com...';
    submitBtn.disabled = true;

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          candidate_list_id: parseInt(candidateListId),
          classet_job_id: parseInt(classetJobId),
          role_name: roleName || '(unnamed)'
        })
      });

      if (response.ok) {
        status.className = 'status success';
        status.textContent = 'Role mapping added successfully!';

        // Add to session history
        submissions.push({ candidateListId, classetJobId, roleName });
        renderHistory();

        // Clear form for next entry
        form.reset();
      } else {
        throw new Error(`HTTP ${response.status}`);
      }
    } catch (err) {
      status.className = 'status error';
      status.textContent = `Something went wrong: ${err.message}. Make sure the Make.com scenario is running.`;
    }

    submitBtn.disabled = false;
  });

  function renderHistory() {
    if (submissions.length === 0) {
      historyList.innerHTML = '<p class="empty-history">No mappings added yet.</p>';
      return;
    }

    historyList.innerHTML = submissions.map((s, i) => `
      <div class="history-item">
        <span>${s.roleName || '(unnamed)'}</span>
        <span class="ids">${s.candidateListId} → ${s.classetJobId}</span>
      </div>
    `).join('');
  }
</script>

</body>
</html>
